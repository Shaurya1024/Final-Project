<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Snake Game</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #2c3e50;
            color: #ecf0f1;
        }
        canvas {
            border: 1px solid #ecf0f1;
        }
        input, select {
            margin: 5px;
            padding: 10px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="start-screen">
        <h1>Snake Game</h1>
        <label for="username">Enter your name:</label>
        <input type="text" id="username" placeholder="Your Name" />
        <label for="speed">Select Speed:</label>
        <select id="speed">
            <option value="100">Fast</option>
            <option value="200">Normal</option>
            <option value="300">Slow</option>
        </select>
        <button id="start-btn">Start Game</button>
    </div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div id="result-screen" style="display:none;">
        <h2>Game Over!</h2>
        <p id="final-score"></p>
        <button id="restart-btn">Restart Game</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('start-screen');
        const resultScreen = document.getElementById('result-screen');
        const finalScore = document.getElementById('final-score');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        let speed;
        let snake;
        let food;
        let score;
        let gameLoop;
        let timer;
        let isGameOver;
        let timerCount = 30;

        class Snake {
            constructor() {
                this.body = [
                    { x: 10, y: 10 },
                    { x: 10, y: 9 },
                    { x: 10, y: 8 }
                ];
                this.direction = { x: 0, y: 0 };
            }
            update() {
                const head = { x: this.body[0].x + this.direction.x, y: this.body[0].y + this.direction.y };
                this.body.unshift(head);
                if (head.x === food.x && head.y === food.y) {
                    score++;
                    createFood();
                } else {
                    this.body.pop();
                }
                checkCollision();
            }
            draw() {
                ctx.fillStyle = '#2ecc71';
                this.body.forEach(segment => ctx.fillRect(segment.x * 20, segment.y * 20, 18, 18));
            }
        }

        function createFood() {
            food = {
                x: Math.floor(Math.random() * (canvas.width / 20)),
                y: Math.floor(Math.random() * (canvas.height / 20))
            };
        }

        function drawFood() {
            ctx.fillStyle = '#e74c3c';
            ctx.fillRect(food.x * 20, food.y * 20, 18, 18);
        }

        function checkCollision() {
            const head = snake.body[0];
            if (head.x < 0 || head.x >= canvas.width / 20 || head.y < 0 || head.y >= canvas.height / 20 ||  
                snake.body.slice(1).some(segment => segment.x === head.x && segment.y === head.y)) {
                clearInterval(timer);
                clearInterval(gameLoop);
                isGameOver = true;
                endGame();
            }
        }

        function endGame() {
            startScreen.style.display = 'none';
            resultScreen.style.display = 'block';
            finalScore.textContent = `Final Score: ${score}`;
        }

        function game() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            snake.update();
            snake.draw();
            drawFood();
            timerCount--;
            if (timerCount <= 0) {
                clearInterval(timer);
                clearInterval(gameLoop);
                isGameOver = true;
                endGame();
            }
        }

        function startGame() {
            snake = new Snake();
            score = 0;
            timerCount = 30;
            isGameOver = false;
            startScreen.style.display = 'none';
            resultScreen.style.display = 'none';
            createFood();
            gameLoop = setInterval(game, speed);
            timer = setInterval(() => { timerCount--; }, 1000);
        }

        document.addEventListener('keydown', event => {
            switch (event.key) {
                case 'ArrowUp':
                    if (snake.direction.y !== 1) snake.direction = { x: 0, y: -1 };
                    break;
                case 'ArrowDown':
                    if (snake.direction.y !== -1) snake.direction = { x: 0, y: 1 };
                    break;
                case 'ArrowLeft':
                    if (snake.direction.x !== 1) snake.direction = { x: -1, y: 0 };
                    break;
                case 'ArrowRight':
                    if (snake.direction.x !== -1) snake.direction = { x: 1, y: 0 };
                    break;
            }
        });

        startBtn.onclick = () => {
            speed = parseInt(document.getElementById('speed').value);
            const username = document.getElementById('username').value;
            if(!username) {
                alert('Please enter your name to start the game.');
                return;
            }
            startGame();
        };

        restartBtn.onclick = () => {
            startGame();
        };
    </script>
</body>
</html>
